name: نشر قصة يومية

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    branches: [master]


jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: اختبار Groq API
        run: |
          echo "أول 10 حروف: ${GROQ_API_KEY:0:10}..."
          echo "الطول: ${#GROQ_API_KEY}"
          echo "---"
          echo "اختبار الاتصال..."
          RESP=$(curl -s -w "\n%{http_code}" https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama3-70b-8192","messages":[{"role":"user","content":"hi"}],"max_tokens":5}')
          CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP: $CODE"
          echo "رد: $BODY"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - run: pip install -r requirements.txt
      - name: تشغيل البوت
        run: python src/bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
