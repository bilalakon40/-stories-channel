name: نشر قصة يومية

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: تحقق من الأسرار
        run: |
          echo "BOT_TOKEN: $([ -n \"$BOT_TOKEN\" ] && echo 'موجود ✅' || echo 'غير موجود ❌')"
          echo "GROQ_API_KEY: $([ -n \"$GROQ_API_KEY\" ] && echo 'موجود ✅' || echo 'غير موجود ❌')"
          echo "CHANNEL_ID: $([ -n \"$CHANNEL_ID\" ] && echo 'موجود ✅' || echo 'غير موجود ❌')"
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      - run: pip install -r requirements.txt
      - run: python src/bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
