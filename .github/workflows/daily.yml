name: نشر قصة يومية

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    branches: [master]


jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: اختبار Groq API
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":"hi"}],"max_tokens":5}')
          echo "HTTP Code: $CODE"
          if [ "$CODE" != "200" ]; then echo "❌ المفتاح خطأ"; else echo "✅ المفتاح صحيح"; fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - run: pip install -r requirements.txt
      - name: تشغيل البوت
        run: python src/bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
